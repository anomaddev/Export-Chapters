# separate terms of service, privacy policy, and support
# documentation.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      # (Optional) lint/tests – add your tools here, e.g. ruff/pytest/mypy
      # - name: Lint
      #   run: python -m pip install ruff && ruff check .
      # - name: Tests
      #   run: python -m pip install pytest && pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Show dist
        run: ls -lah dist
